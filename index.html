<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Fußball Tickets</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #FFFFFF;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            font-family: Arial, sans-serif;
        }

        .controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        /* ⚽ Logo-Bereich unten links */
        .logo-container {
            position: fixed;
            bottom: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .logo-container img {
            width: 130px;
            height: auto;
        }
    </style>
</head>

<body>

    <h1>Tickets von der ersten bis zur dritten Liga</h1>
    <p>Drei Ligen in einer Website, wer glaubt denn sowas!?</p>

    <div class="controls">
        <label>
            Hintergrundfarbe:
            <input type="color"
                   onchange="document.body.style.backgroundColor = this.value">
        </label>

        <label>
            Textfarbe:
            <input type="color"
                   onchange="document.body.style.color = this.value">
        </label>
    </div>

    <!-- ⚽ Logos unten links -->
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/en/e/e3/Eintracht_Frankfurt_crest.svg" alt="Eintracht Frankfurt">
        <img src="https://upload.wikimedia.org/wikipedia/en/9/9e/Fortuna_D%C3%BCsseldorf_logo.svg" alt="Fortuna Düsseldorf">
        <img src="https://upload.wikimedia.org/wikipedia/en/3/3c/1._FC_Saarbr%C3%BCcken_logo.svg" alt="FC Saarbrücken">
    </div>

</body>
</html>
