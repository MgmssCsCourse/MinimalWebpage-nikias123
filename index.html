<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Fußball Tickets</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #FFFFFF;
            color: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 40px;
            font-family: Arial, sans-serif;
        }

        .controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        /* 📌 Bilder-Container unten links */
        .image-container {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 150px;
            height: 250px; /* sorgt für Scrollbar */
            overflow-y: auto;
            background: rgba(0,0,0,0.1);
            padding: 5px;
            border-radius: 8px;
        }

        .image-container img {
            width: 100%;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>

<body>

    <h1>Tickets von der ersten bis zur dritten Liga</h1>
    <p>Drei Ligen in einer Website, wer glaubt denn sowas!?</p>

    <!-- 🎨 Controls -->
    <div class="controls">
        <label>
            Hintergrundfarbe:
            <input type="color"
                   onchange="document.body.style.backgroundColor = this.value">
        </label>

        <label>
            Textfarbe:
            <input type="color"
                   onchange="document.body.style.color = this.value">
        </label>
    </div>

    <!-- 🖼️ Bilder unten links -->
    <div class="image-container">
        <img src="/mnt/data/24C1A90E-0C4D-466E-AE2D-FDEFE8BFED64.png">
        <img src="/mnt/data/24C1A90E-0C4D-466E-AE2D-FDEFE8BFED64.png">
        <img src="/mnt/data/24C1A90E-0C4D-466E-AE2D-FDEFE8BFED64.png">
    </div>

</body>
</html>
