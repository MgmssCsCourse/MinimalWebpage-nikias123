<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Fußball Tickets</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: 93E3FD;
            color:black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* nach oben */
            padding-top: 40px; /* Abstand nach oben */
            font-family: Arial, sans-serif;
        }

        .controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <!-- Hier kann man Fußballtickets kaufen -->
    <!-- Man sieht eine Tabelle mit den aktuellen Spielen -->
    <!-- Man kann nach unten scrollen und auswählen -->
    <!-- Fertig -->

    <h1>Tickets von der ersten bis zur dritten Liga</h1>
    <p>Drei Ligen in einer Website, wer glaubt denn sowas!?</p>

    <div class="controls">
        <label>
            Hintergrundfarbe:
            <input type="color"
                   onchange="document.body.style.backgroundColor = this.value">
        </label>

        <label>
            Textfarbe:
            <input type="color"
                   onchange="document.body.style.color = this.value">
        </label>
    </div>

</body>
</html>
