<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Sport Tickets</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: red;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .controls {
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 10px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <!-- Hier kann man Fußballtickets kaufen -->
    <!-- Man sieht eine Tabelle mit den aktuellen Spielen --›
    <!-- Man kann nach unten scrollen und Auswählen was man kaufen will --›
    <!-- Fertig -->
    <h1>Tickets von der ersten bis zur dritten Liga</h1>
    <p>3. Ligen in einer Website, wer glaubt denn sowas!?</p>

    <div class="controls">
        <label>
            Hintergrundfarbe:
            <input type="color"
                   onchange="document.body.style.backgroundColor = this.value">
        </label>

        <label>
            Textfarbe:
            <input type="color"
                   onchange="document.body.style.color = this.value">
        </label>
    </div>

</body>
</html>
