<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>Fußball Tickets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <h1>Tickets von der ersten bis zur dritten Liga</h1>
    <p>Drei Ligen in einer Website, wer glaubt denn sowas!?</p>

    <div class="controls">
        <label>
            Hintergrundfarbe:
            <input type="color"
                   onchange="document.body.style.backgroundColor = this.value">
        </label>

        <label>
            Textfarbe:
            <input type="color"
                   onchange="document.body.style.color = this.value">
        </label>
    </div>

    <!-- ⚽ Logos unten links -->
    <div class="logo-container">
        <img src="https://upload.wikimedia.org/wikipedia/en/e/e3/Eintracht_Frankfurt_crest.svg" alt="Eintracht Frankfurt">
        <img src="https://upload.wikimedia.org/wikipedia/en/9/9e/Fortuna_D%C3%BCsseldorf_logo.svg" alt="Fortuna Düsseldorf">
        <img src="https://upload.wikimedia.org/wikipedia/en/3/3c/1._FC_Saarbr%C3%BCcken_logo.svg" alt="FC Saarbrücken">
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
