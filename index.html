<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fußball Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: red;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* nach oben */
            padding-top: 40px; /* Abstand nach oben */
            font-family: Arial, sans-serif;
        }

        .controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <!-- Hier kann man Fußballtickets kaufen -->
    <!-- Bilder -->
    <!-- Man kann nach unten scrollen und auswählen -->
    <!-- Fertig -->

    <h1>Tickets von der ersten bis zur dritten Liga</h1>
    <p>Drei Ligen in einer Website, wer glaubt denn sowas!?</p>

    <div class="controls">
        <label>
            Hintergrundfarbe:
            <input type="color"
                   onchange="document.body.style.backgroundColor = this.value">
        </label>

        <label>
            Textfarbe:
            <input type="color"
                   onchange="document.body.style.color = this.value">
        </label>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
